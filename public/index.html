<html>
    <head>



    </head>
    <body>



        <img src="http://droplet:8080/video_feed_0" width="1920" height="1080"/>



        
        <!---
        <button id="forward" onclick="forward()">Forward</button>
        <button id="backward" onclick="backward()">Backward</button>
        <button id="left" onclick="left()">Left</button>
        <button id="right" onclick="right()">Right</button>
        -->
        



        <script>

            //the control api is at /controls

            let controls = {
                forward: false,
                backward: false,
                left: false,
                right: false
            }

            let controlVector = {
                forward:0,
                turn:0
            }

            function forward(val) {
                controls.forward = val
                if(val){
                    if(controlVector.forward==0){
                        controlVector.forward = 0.3;

                    }
                    controlVector.forward += 0.04;
                    controlVector.forward=Math.min(1,controlVector.forward);
                } else {   
                    controlVector.forward = 0;
                }

            }
            
            function backward(val) {
                controls.backward = val
                if(val){
                                        if(controlVector.forward==0){
                        controlVector.forward = -0.3;

                    }

                    controlVector.forward -= 0.1;
                    controlVector.forward=Math.max(-1,controlVector.forward);
                } else {   
                    controlVector.forward = 0;
                }
            }

            function left(val) {
                controls.left = val;
                if(val){
                    controlVector.turn-=1;
                    controlVector.turn=Math.max(-1,controlVector.turn)                    
                } else {
                    controlVector.turn=0;
                }
            }

            function right(val) {
                controls.right = val
                if(val){
                    controlVector.turn+=1;
                    controlVector.turn=Math.min(1,controlVector.turn)
                } else {
                    controlVector.turn=0;
                }
            }




            function submit() {



                fetch('/controls', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(controlVector)
                });
                //controlVector = {
                //    forward: 0,
                //    turn: 0,
                //}
            }


            


            //register wasd
            document.addEventListener('keydown', function(event) {
                if(event.key == 'w') {
                    forward(true)
                }
                if(event.key == 's') {
                    backward(true)
                }
                if(event.key == 'a') {
                    left(true)
                }
                if(event.key == 'd') {
                    right(true)
                }
                submit()

            });



            //register wasd
            document.addEventListener('keyup', function(event) {
                if(event.key == 'w') {
                    forward(false)
                }
                if(event.key == 's') {
                    backward(false)
                }
                if(event.key == 'a') {
                    left(false)
                }
                if(event.key == 'd') {
                    right(false)
                }
                submit()

            })


        </script>








    


    </body>
</html>
