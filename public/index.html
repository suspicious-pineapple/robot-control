<html>
    <head>



    </head>
    <body>








        <canvas id="viewCanvas" width="800" height="600"></canvas>
        
        <button id="forward" onclick="forward()">Forward</button>
        <button id="backward" onclick="backward()">Backward</button>
        <button id="left" onclick="left()">Left</button>
        <button id="right" onclick="right()">Right</button>
        
        



        <script>

            //the control api is at /controls

            let controls = {
                forward: false,
                backward: false,
                left: false,
                right: false
            }

            function forward(val) {
                controls.forward = val
            }
            
            function backward(val) {
                controls.backward = val
            }

            function left(val) {
                controls.left = val
            }

            function right(val) {
                controls.right = val
            }




            function submit() {
                fetch('/controls', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(controls)
                })
                controls = {
                    forward: false,
                    backward: false,
                    left: false,
                    right: false
                }
            }


            


            //register wasd
            document.addEventListener('keydown', function(event) {
                if(event.key == 'w') {
                    forward(true)
                }
                if(event.key == 's') {
                    backward(true)
                }
                if(event.key == 'a') {
                    left(true)
                }
                if(event.key == 'd') {
                    right(true)
                }
                submit()

            });



            //register wasd
            document.addEventListener('keyup', function(event) {
                if(event.key == 'w') {
                    forward(false)
                }
                if(event.key == 's') {
                    backward(false)
                }
                if(event.key == 'a') {
                    left(false)
                }
                if(event.key == 'd') {
                    right(false)
                }
                submit()

            })


        </script>








    


    </body>
</html>
